<!DOCTYPE html>
<html>
<head>
    <title>Hand Gesture Car Control</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { margin: 0; overflow: hidden; background-color: #f0f0f0; }
        #info {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            background: rgba(0,0,0,0.7);
            padding: 15px;
            border-radius: 8px;
            font-family: sans-serif;
            z-index: 10;
        }
        #video-container {
            position: absolute;
            bottom: 10px;
            right: 10px;
            width: 240px;
            height: 180px;
            border: 2px solid #fff;
            border-radius: 10px;
            overflow: hidden;
            z-index: 10;
            /* Flip the video horizontally so your left hand appears on the left */
            transform: scaleX(-1); 
        }
        #webcam { width: 100%; height: 100%; object-fit: cover; }
        #start-button {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 15px 30px;
            font-size: 1.2em;
            cursor: pointer;
            z-index: 20;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
        }
    </style>
</head>
<body>

    <button id="start-button">Start Camera & Drive</button>

    <div id="info">
        <h1>Hand Gesture Car Control</h1>
        <p>1. Click 'Start Camera & Drive'.</p>
        <p>2. Hold your **OPEN HAND** in front of the camera.</p>
        <p>3. Move your hand **LEFT/RIGHT** to steer the car.</p>
        <p id="status">Status: Waiting for start...</p>
    </div>

    <div id="video-container">
        <video id="webcam" playsinline></video>
    </div>

    <div id="container"></div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        // Import MediaPipe library
        import { GestureRecognizer, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3";

        // --- Variables ---
        let gestureRecognizer;
        let webcamElement = document.getElementById("webcam");
        let lastVideoTime = -1;
        let car;
        let targetX = 0;
        const STEERING_SENSITIVITY = 15;
        const MAX_STEERING_RANGE = 8;
        const statusElement = document.getElementById('status');

        // --- 1. Three.js Scene Setup (Same as previous) ---
        let scene, camera, renderer;

        function initScene() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87ceeb);
            scene.fog = new THREE.Fog(0x87ceeb, 10, 50);
            
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 5, 10);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('container').appendChild(renderer.domElement);

            // Lighting
            scene.add(new THREE.AmbientLight(0xffffff, 0.6));
            const dirLight = new THREE.DirectionalLight(0xffffff, 1);
            dirLight.position.set(5, 10, 5);
            scene.add(dirLight);

            // Road
            const roadGeo = new THREE.PlaneGeometry(10, 100);
            const roadMat = new THREE.MeshStandardMaterial({ color: 0x333333 });
            const road = new THREE.Mesh(roadGeo, roadMat);
            road.rotation.x = -Math.PI / 2;
            scene.add(road);

            // Car Model
            car = createCarModel();
            scene.add(car);
            
            camera.lookAt(car.position);

            window.addEventListener('resize', onWindowResize, false);
            
            animate();
        }

        function createCarModel() {
            const group = new THREE.Group();
            // Car Body (Red)
            const body = new THREE.Mesh(new THREE.BoxGeometry(2, 0.8, 4), new THREE.MeshStandardMaterial({color: 0xc40a0a}));
            body.position.y = 0.4;
            // Cabin (White/Gray)
            const cabin = new THREE.Mesh(new THREE.BoxGeometry(1.6, 0.7, 2), new THREE.MeshStandardMaterial({color: 0xcccccc}));
            cabin.position.y = 1.15;
            cabin.position.z = 0.3;

            // Wheels (Simple Cylinders)
            const wheelGeo = new THREE.CylinderGeometry(0.4, 0.4, 0.3, 10);
            const wheelMat = new THREE.MeshStandardMaterial({ color: 0x000000 });
            
            function createWheel(x, z) {
                const wheel = new THREE.Mesh(wheelGeo, wheelMat);
                wheel.rotation.z = Math.PI / 2;
                wheel.position.set(x, 0.4, z);
                return wheel;
            }
            
            group.add(body, cabin, createWheel(1.1, 1.5), createWheel(-1.1, 1.5), createWheel(1.1, -1.5), createWheel(-1.1, -1.5));
            group.position.y = 0.4;
            return group;
        }

        // --- 2. Hand Tracking Setup ---

        async function initHandTracking() {
            statusElement.innerText = "Status: Loading MediaPipe AI...";
            const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm");
            
            gestureRecognizer = await GestureRecognizer.createFromOptions(vision, {
                baseOptions: {
                    modelAssetPath: "https://storage.googleapis.com/mediapipe-models/gesture_recognizer/gesture_recognizer/float16/1/gesture_recognizer.task",
                    delegate: "GPU"
                },
                runningMode: "VIDEO",
                numHands: 1
            });
            
            statusElement.innerText = "Status: AI Loaded. Starting Camera...";
            await startWebcam();
        }

        async function startWebcam() {
            try {
                const constraints = { 
                    video: { facingMode: "user" } // Use front camera on mobile
                };
                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                webcamElement.srcObject = stream;
                
                webcamElement.addEventListener("loadeddata", () => {
                    webcamElement.play();
                    document.getElementById('start-button').style.display = 'none';
                    statusElement.innerText = "Status: Live. Show your open hand!";
                });
            } catch (error) {
                console.error("Could not access camera: ", error);
                statusElement.innerText = "Error: Camera access failed. Ensure you are on HTTPS or localhost.";
            }
        }

        // --- 3. The Gesture Recognition Loop ---

        function detectGestures() {
            if (!gestureRecognizer || webcamElement.readyState !== 4) {
                // Not ready yet
                return;
            }

            if (webcamElement.currentTime !== lastVideoTime) {
                lastVideoTime = webcamElement.currentTime;
                
                // Run gesture detection on the current video frame
                const results = gestureRecognizer.recognizeVideo(webcamElement, Date.now());

                if (results.landmarks && results.landmarks.length > 0) {
                    const hand = results.landmarks[0]; // First detected hand
                    const gesture = results.gestures[0][0].categoryName;
                    
                    // --- CONTROL LOGIC ---
                    if (gesture === "Open_Palm") {
                        // Use landmark 9 (middle of the palm) for smooth tracking
                        const palmX = hand[9].x; 
                        
                        // Map 0-1 from camera to the game's movement range
                        // (1 - palmX) is used because the video is mirrored (scaleX(-1) in CSS)
                        targetX = ((1 - palmX) - 0.5) * STEERING_SENSITIVITY;
                        targetX = Math.max(-MAX_STEERING_RANGE, Math.min(MAX_STEERING_RANGE, targetX));
                        statusElement.innerText = `Status: Steering with Open Palm (Gesture: ${gesture})`;

                    } else if (gesture === "Closed_Fist") {
                        // Stop movement with a closed fist
                        targetX = car.position.x; // Stop trying to move
                        statusElement.innerText = `Status: STOP (Gesture: ${gesture})`;
                    } else {
                        statusElement.innerText = `Status: Hand detected (${gesture}). Use OPEN HAND or CLOSED FIST.`;
                    }
                } else {
                    statusElement.innerText = "Status: No hand detected.";
                }
            }
        }

        // --- 4. Animation Loop ---

        function animate() {
            requestAnimationFrame(animate);

            // Run AI detection
            detectGestures();

            // Smooth Car Movement (Lerp)
            car.position.x += (targetX - car.position.x) * 0.15; 
            
            // Car Tilt (visual steering feedback)
            const steerAngle = (targetX - car.position.x) * 0.05;
            car.rotation.y = steerAngle;

            // Camera follows the car
            camera.position.x = car.position.x * 0.5;
            camera.lookAt(car.position);

            renderer.render(scene, camera);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // --- Start Application ---
        document.getElementById('start-button').addEventListener('click', () => {
            initScene();
            initHandTracking();
        });
    </script>
</body>
</html>
